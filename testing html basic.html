<!DOCTYPE html>
<html>




<head>
  <title>JS Practice</title>
</head>




<body>


  <p id="counter">0</p>
  <button id="add">Add +1</button>





  <script>
    let count = 0;
    const display = document.getElementById("counter");
    const button = document.getElementById("add");

    button.addEventListener("click", () => {
      count++;
      display.textContent = count;
    });
  </script>
  


</body>
</html>
